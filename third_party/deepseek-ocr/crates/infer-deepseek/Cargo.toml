[package]
name = "deepseek-ocr-infer-deepseek"
version = "0.3.7"
edition = "2024"

[dependencies]
deepseek-ocr-core = { path = "../core" }
deepseek-ocr-dsq-runtime = { path = "../dsq-runtime" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
candle-core = { version = "0.9", default-features = false }
candle-nn = { version = "0.9", default-features = false }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
anyhow = "1.0"
tracing = "0.1"
once_cell = "1.19"
tokenizers = { version = "0.22", default-features = true }
rayon = "1.10"
rand = { version = "0.8.5", features = ["std"] }
candle-flash-attn = { version = "0.9", default-features = false, optional = true }

[features]
default = []
cli-debug = []
dhat-heap = ["deepseek-ocr-core/dhat-heap"]
memlog = ["deepseek-ocr-core/memlog"]
flash-attn = ["candle-flash-attn"]
metal = [
    "candle-core/metal",
    "candle-nn/metal",
]
accelerate = [
    "candle-core/accelerate",
    "candle-nn/accelerate",
]
cuda = [
    "candle-core/cuda",
    "candle-nn/cuda",
]
mkl = [
    "candle-core/mkl",
    "candle-nn/mkl",
]
qtensor-bytes = ["deepseek-ocr-dsq-runtime/qtensor-bytes"]

[dev-dependencies]
ndarray = "0.16"
ndarray-npy = "0.9"
