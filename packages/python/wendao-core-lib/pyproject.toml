[project]
name = "wendao-core-lib"
version = "0.1.1"
description = "Transport-first Python client package for the xiuxian-wendao Rust runtime"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyarrow>=14.0.0",
]

[project.scripts]
wendao-core-lib-scaffold = "wendao_core_lib.scaffold:main"

[dependency-groups]
test = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wendao_core_lib"]

[tool.uv]
package = true
