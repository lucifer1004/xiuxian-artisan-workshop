[project]
name = "xiuxian-test-kit"
version = "0.1.0"
description = "Exclusive testing framework for Omni Dev Fusion"
dependencies = [
    "pytest>=8.0.0",
    "pyarrow>=23.0.0",
    "xiuxian-foundation",
    "xiuxian-core",
]
requires-python = ">=3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.entry-points.pytest11]
xiuxian_test_kit = "xiuxian_test_kit.plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/xiuxian_test_kit"]
