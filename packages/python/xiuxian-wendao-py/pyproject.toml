[project]
name = "xiuxian-wendao-py"
version = "0.1.0"
description = "Transport-first Python client package for the xiuxian-wendao Rust runtime"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyarrow>=14.0.0",
]

[project.scripts]
xiuxian-wendao-scaffold = "xiuxian_wendao_py.scaffold:main"

[dependency-groups]
test = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/xiuxian_wendao_py"]

[tool.uv]
package = true
