[project]
name = "xiuxian-wendao-analyzer"
version = "0.1.1"
description = "Analyzer-layer Python package built on top of xiuxian-wendao-py"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyarrow>=14.0.0",
    "xiuxian-wendao-py",
]

[dependency-groups]
test = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/xiuxian_wendao_analyzer"]

[tool.uv]
package = true

[tool.uv.sources]
xiuxian-wendao-py = { path = "../xiuxian-wendao-py" }
