[project]
name = "xiuxian-wendao-analyzer"
version = "0.2.1"
description = "Analyzer-layer Python package built on top of wendao-core-lib"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyarrow>=14.0.0",
    "wendao-arrow-interface",
    "wendao-core-lib",
]

[dependency-groups]
test = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/xiuxian_wendao_analyzer"]

[tool.uv]
package = true

[tool.uv.sources]
wendao-core-lib = { path = "../wendao-core-lib" }
wendao-arrow-interface = { path = "../wendao-arrow-interface" }
