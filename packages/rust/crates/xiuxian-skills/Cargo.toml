[package]
name = "xiuxian-skills"
version.workspace = true
edition.workspace = true
description = "Unified skill scanner for markdown metadata and command discovery"
authors = ["CyberXiuXian Artisan Studio"]
license = "Apache-2.0"
publish = false

[dependencies]
# AST parsing for script scanning
xiuxian-ast = { path = "../xiuxian-ast" }
xiuxian-config-core = { path = "../xiuxian-config-core" }
xiuxian-macros = { path = "../xiuxian-macros" }
xiuxian-types = { path = "../xiuxian-types" }

# Serialization
serde = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
toml = "0.8"

# Async runtime
tokio = { workspace = true, features = ["fs"] }

# File traversal
walkdir = { workspace = true }

# Hashing for incremental indexing
sha2 = { workspace = true }
hex = { workspace = true }

# Parallel processing
rayon = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
log = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
insta = { workspace = true }
xiuxian-testing = { path = "../xiuxian-testing" }

[lints]
workspace = true
