[package]
name = "xiuxian-qianhuan"
version.workspace = true
edition.workspace = true
description = "Xiuxian-Qianhuan prompt injection engine with XML Q&A contracts"
authors = ["CyberXiuXian Artisan workshop"]
license = "Apache-2.0"
publish = false

[features]
default = []
zhenfa-router = ["dep:axum", "dep:xiuxian-zhenfa", "dep:xiuxian-wendao", "dep:xiuxian-wendao-core"]

[dependencies]
async-trait = "0.1"
serde = { workspace = true, features = ["derive"] }
toml = { workspace = true }
futures = "0.3"
quick-xml = { workspace = true }
tera = "1"
serde_json = { workspace = true }
schemars = { workspace = true }
anyhow = { workspace = true }
log = { workspace = true }
thiserror = { workspace = true }
walkdir = { workspace = true }
globset = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt"] }
axum = { workspace = true, optional = true }
xiuxian-io = { path = "../xiuxian-io", features = ["notify"] }
redis = { workspace = true }
xiuxian-zhenfa = { path = "../xiuxian-zhenfa", optional = true }
xiuxian-wendao = { path = "../xiuxian-wendao", optional = true }
xiuxian-wendao-core = { path = "../xiuxian-wendao-core", optional = true }
xiuxian-testing = { path = "../xiuxian-testing" }

[dev-dependencies]
tempfile = "3"
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
reqwest = { workspace = true }

[lints]
workspace = true
