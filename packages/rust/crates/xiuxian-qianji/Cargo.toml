[package]
name = "xiuxian-qianji"
version.workspace = true
edition.workspace = true
description = "Qianji (Thousand Mechanisms) - High-performance probabilistic workflow engine"
authors.workspace = true
license.workspace = true
publish = false

[features]
default = []
llm = ["dep:xiuxian-llm"]

[dependencies]
petgraph = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
redis = { workspace = true, features = ["tokio-comp"] }
log = { workspace = true }
futures = { workspace = true }
rand = { workspace = true }
regex = "1"
md5 = { workspace = true }
include_dir = { workspace = true }
walkdir = { workspace = true }
globset = { workspace = true }
tempfile = { workspace = true }
merman-core = "0.4"
quick-xml = { workspace = true, features = ["serialize"] }
reqwest = { workspace = true }
xiuxian-wendao = { path = "../xiuxian-wendao", default-features = false }
xiuxian-wendao-core = { path = "../xiuxian-wendao-core" }
xiuxian-wendao-runtime = { path = "../xiuxian-wendao-runtime" }
xiuxian-wendao-parsers = { path = "../xiuxian-wendao-parsers" }
xiuxian-qianhuan = { path = "../xiuxian-qianhuan" }
xiuxian-ast = { path = "../xiuxian-ast" }
xiuxian-macros = { path = "../xiuxian-macros" }
xiuxian-zhenfa = { path = "../xiuxian-zhenfa" }
xiuxian-logging = { path = "../xiuxian-logging" }
xiuxian-llm = { path = "../xiuxian-llm", optional = true }
xiuxian-window = { path = "../xiuxian-window" }
xiuxian-testing = { path = "../xiuxian-testing" }
xiuxian-config-core = { path = "../xiuxian-config-core" }

[dev-dependencies]
axum = { workspace = true }
insta = { workspace = true }
xiuxian-zhixing = { path = "../xiuxian-zhixing" }

[lints]
workspace = true

[lib]
name = "xiuxian_qianji"
path = "src/lib.rs"

[[bin]]
name = "qianji"
path = "src/bin/qianji.rs"
required-features = ["llm"]

# Integration tests requiring llm feature
[[test]]
name = "llm_augmented_formal_audit"
path = "tests/integration/llm_augmented_formal_audit.rs"
required-features = ["llm"]

[[test]]
name = "llm_analyzer"
path = "tests/integration/llm_analyzer.rs"
required-features = ["llm"]

[[test]]
name = "llm_multi_tenancy"
path = "tests/integration/llm_multi_tenancy.rs"
required-features = ["llm"]

[[test]]
name = "runtime_config"
path = "tests/integration/runtime_config.rs"

[[test]]
name = "formal_audit_advisory_llm"
path = "tests/integration/formal_audit_advisory_llm.rs"
required-features = ["llm"]

[[test]]
name = "contract_feedback_pipeline_llm"
path = "tests/integration/contract_feedback_pipeline_llm.rs"
required-features = ["llm"]

[[test]]
name = "contract_feedback_pipeline"
path = "tests/integration/contract_feedback_pipeline.rs"

[[test]]
name = "flowhub_contracts"
path = "tests/integration/flowhub_contracts.rs"

[[test]]
name = "flowhub_manifest_contracts"
path = "tests/integration/flowhub_manifest_contracts.rs"

[[test]]
name = "flowhub_materialize"
path = "tests/integration/flowhub_materialize.rs"

[[test]]
name = "flowhub_scenario_show_check"
path = "tests/integration/flowhub_scenario_show_check.rs"

[[test]]
name = "audit_scenario_contract"
path = "tests/integration/test_audit_scenario_contract.rs"

[[test]]
name = "formal_audit_advisory_executor"
path = "tests/integration/test_formal_audit_advisory_executor.rs"

[[test]]
name = "wendao_persisted_rest_docs_contract_feedback"
path = "tests/integration/test_wendao_persisted_rest_docs_contract_feedback.rs"

[[test]]
name = "wendao_live_rest_docs_contract_feedback"
path = "tests/integration/test_wendao_live_rest_docs_contract_feedback.rs"

# Unit tests for telemetry
[[test]]
name = "unit_telemetry_events"
path = "tests/unit/unit_telemetry_events.rs"

[[test]]
name = "workdir_contracts"
path = "tests/integration/workdir_contracts.rs"
