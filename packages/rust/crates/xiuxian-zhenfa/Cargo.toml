[package]
name = "xiuxian-zhenfa"
version.workspace = true
edition.workspace = true
description = "Zhenfa (Matrix Gateway) - Native-first tool microkernel with optional JSON-RPC gateway"
authors.workspace = true
license.workspace = true
publish = false

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
schemars = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tempfile = { workspace = true }
uuid = { workspace = true }
xiuxian-macros = { path = "../xiuxian-macros" }
xiuxian-testing = { path = "../xiuxian-testing" }
pulldown-cmark = { workspace = true }
quick-xml = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "sync"] }

[lints]
workspace = true

[lib]
name = "xiuxian_zhenfa"
path = "src/lib.rs"
