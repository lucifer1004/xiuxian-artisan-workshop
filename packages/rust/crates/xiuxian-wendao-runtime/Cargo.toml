[package]
name = "xiuxian-wendao-runtime"
version.workspace = true
edition.workspace = true
description = "Runtime-owned host behavior for xiuxian-wendao extraction"
authors = ["CyberXiuXian Artisan Studio"]
license = "Apache-2.0"
publish = false

[features]
default = []
julia = [
    "dep:arrow-array",
    "dep:arrow-flight",
    "dep:arrow-schema",
    "dep:async-trait",
    "dep:futures",
    "dep:tokio",
    "dep:tokio-stream",
    "dep:tonic",
    "dep:xiuxian-vector",
]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
arrow-flight = { version = "57.3.0", optional = true }
arrow-array = { version = "57.3.0", optional = true }
arrow-schema = { version = "57.3.0", optional = true }
async-trait = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
tokio-stream = { version = "0.1", features = ["net"], optional = true }
tonic = { version = "0.14.5", default-features = false, features = ["transport"], optional = true }
xiuxian-config-core = { path = "../xiuxian-config-core" }
xiuxian-wendao-core = { path = "../xiuxian-wendao-core" }
xiuxian-vector = { path = "../xiuxian-vector", optional = true }

[dev-dependencies]
serial_test = { version = "3", features = ["file_locks"] }
tempfile = { workspace = true }

[lints]
workspace = true
