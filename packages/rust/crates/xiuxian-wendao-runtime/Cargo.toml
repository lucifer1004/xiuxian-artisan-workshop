[package]
name = "xiuxian-wendao-runtime"
version.workspace = true
edition.workspace = true
description = "Runtime-owned host behavior for xiuxian-wendao extraction"
authors = ["CyberXiuXian Artisan workshop"]
license = "Apache-2.0"
publish = false

[features]
default = []
transport = [
    "dep:async-trait",
    "dep:datafusion",
    "dep:futures",
    "dep:tokio",
    "dep:tokio-stream",
    "dep:tonic",
    "dep:xiuxian-vector",
    "dep:xiuxian-vector-store",
]

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
base64 = { workspace = true }
arrow-flight = { workspace = true, features = ["flight-sql"] }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
include_dir = { workspace = true }
async-trait = { workspace = true, optional = true }
datafusion = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
tokio-stream = { version = "0.1", features = ["net"], optional = true }
tonic = { version = "0.14.5", default-features = false, features = ["transport"], optional = true }
xiuxian-config-core = { path = "../xiuxian-config-core" }
xiuxian-testing = { path = "../xiuxian-testing" }
xiuxian-wendao-core = { path = "../xiuxian-wendao-core" }
xiuxian-wendao-parsers = { path = "../xiuxian-wendao-parsers" }
xiuxian-vector = { path = "../xiuxian-vector", optional = true }
xiuxian-vector-store = { path = "../xiuxian-vector-store", optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[[example]]
name = "mock_flight_exchange_server"
required-features = ["transport"]

[lints]
workspace = true
