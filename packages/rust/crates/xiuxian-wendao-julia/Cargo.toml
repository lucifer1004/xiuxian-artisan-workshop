[package]
name = "xiuxian-wendao-julia"
version.workspace = true
edition.workspace = true
description = "External Julia Repo Intelligence plugin for xiuxian-wendao"
authors = ["CyberXiuXian Artisan workshop"]
license = "Apache-2.0"
publish = false

[dependencies]
walkdir = { workspace = true }
regex = "1"
toml = "0.8"
arrow = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "time"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
chrono = { workspace = true, features = ["clock"] }
inventory = "0.3"
xiuxian-memory-engine = { path = "../xiuxian-memory-engine" }
xiuxian-wendao-core = { path = "../xiuxian-wendao-core" }
xiuxian-wendao-runtime = { path = "../xiuxian-wendao-runtime", features = ["transport"] }
xiuxian-ast = { path = "../xiuxian-ast", features = ["julia"] }
xiuxian-vector = { path = "../xiuxian-vector" }
xiuxian-testing = { path = "../xiuxian-testing" }

[dev-dependencies]
tempfile = { workspace = true }
insta = { workspace = true }
serial_test = { version = "3", features = ["file_locks"] }
async-trait = { workspace = true }
arrow-flight = { workspace = true }
tokio-stream = { version = "0.1", features = ["net"] }
tonic = { version = "0.14.5", default-features = false, features = ["transport"] }

[lints]
workspace = true
