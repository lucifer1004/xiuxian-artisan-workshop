[package]
name = "xiuxian-llm"
version.workspace = true
edition.workspace = true
description = "LLM/embedding runtime primitives shared across xiuxian and xiuxian-daochang"
authors = ["CyberXiuXian Artisan Studio"]
license = "Apache-2.0"
publish = false

[features]
default = ["vision-dots", "provider-litellm"]
mistral-accel-metal = ["mistralrs/metal"]
mistral-accel-cuda = ["mistralrs/cuda"]
provider-litellm = []
vision-dots = [
    "dep:deepseek-ocr-core",
    "dep:deepseek-ocr-dsq",
    "dep:deepseek-ocr-infer-deepseek",
    "dep:deepseek-ocr-infer-dots",
    "dep:deepseek-ocr-infer-paddleocr",
    "dep:tokenizers",
    "vision-dots-qtensor-bytes",
]
vision-dots-flash-attn = [
    "vision-dots",
    "deepseek-ocr-core/flash-attn",
    "deepseek-ocr-infer-deepseek/flash-attn",
    "deepseek-ocr-infer-dots/flash-attn",
    "deepseek-ocr-infer-paddleocr/flash-attn",
]
vision-dots-qtensor-bytes = [
    "deepseek-ocr-infer-deepseek/qtensor-bytes",
]
vision-dots-accelerate = [
    "vision-dots",
    "candle-core/accelerate",
    "deepseek-ocr-core/accelerate",
    "deepseek-ocr-infer-deepseek/accelerate",
    "deepseek-ocr-infer-dots/accelerate",
    "deepseek-ocr-infer-paddleocr/accelerate",
]
vision-dots-mkl = [
    "vision-dots",
    "candle-core/mkl",
    "deepseek-ocr-core/mkl",
    "deepseek-ocr-infer-deepseek/mkl",
    "deepseek-ocr-infer-dots/mkl",
    "deepseek-ocr-infer-paddleocr/mkl",
]
vision-dots-metal = [
    "vision-dots",
    "vision-dots-accelerate",
    "candle-core/metal",
    "deepseek-ocr-core/metal",
    "deepseek-ocr-infer-deepseek/metal",
    "deepseek-ocr-infer-dots/metal",
    "deepseek-ocr-infer-paddleocr/metal",
]
vision-dots-cuda = [
    "vision-dots",
    "vision-dots-flash-attn",
    "deepseek-ocr-core/cuda",
    "deepseek-ocr-infer-deepseek/cuda",
    "deepseek-ocr-infer-dots/cuda",
    "deepseek-ocr-infer-paddleocr/cuda",
]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time"] }
futures = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
redis = { workspace = true, features = ["tokio-comp"] }
sha2 = { workspace = true }
hex = { workspace = true }
base64 = { workspace = true }
rmcp = { workspace = true }
num-traits = "0.2"
image = "0.25"
imageproc = "0.25"
fast_image_resize = { version = "6.0.0", features = ["image", "rayon"] }
candle-core = "0.9.2"
deepseek-ocr-core = { git = "https://github.com/TimmyOVO/deepseek-ocr.rs", rev = "02b933df24f5658d10b37dd48c9c354d95c530c3", package = "deepseek-ocr-core", optional = true }
deepseek-ocr-dsq = { git = "https://github.com/TimmyOVO/deepseek-ocr.rs", rev = "02b933df24f5658d10b37dd48c9c354d95c530c3", package = "deepseek-ocr-dsq", optional = true }
deepseek-ocr-infer-deepseek = { git = "https://github.com/TimmyOVO/deepseek-ocr.rs", rev = "02b933df24f5658d10b37dd48c9c354d95c530c3", package = "deepseek-ocr-infer-deepseek", optional = true }
deepseek-ocr-infer-dots = { git = "https://github.com/TimmyOVO/deepseek-ocr.rs", rev = "02b933df24f5658d10b37dd48c9c354d95c530c3", package = "deepseek-ocr-infer-dots", optional = true }
deepseek-ocr-infer-paddleocr = { git = "https://github.com/TimmyOVO/deepseek-ocr.rs", rev = "02b933df24f5658d10b37dd48c9c354d95c530c3", package = "deepseek-ocr-infer-paddleocr", optional = true }
tokenizers = { workspace = true, optional = true }
xiuxian-mcp = { path = "../xiuxian-mcp" }
xiuxian-macros = { path = "../xiuxian-macros" }
xiuxian-config-core = { path = "../xiuxian-config-core" }
litellm-rs = { workspace = true, features = ["redis"] }
spider = { version = "2.45.29", default-features = false, features = ["basic"] }
spider_agent = "2.45.29"

[target.'cfg(target_os = "macos")'.dependencies]
mistralrs = { version = "0.7.0", features = ["metal"] }

[target.'cfg(target_os = "linux")'.dependencies]
mistralrs = { version = "0.7.0", features = ["cuda"] }

[target.'cfg(not(any(target_os = "macos", target_os = "linux")))'.dependencies]
mistralrs = { version = "0.7.0" }

[dev-dependencies]
axum = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[lints]
workspace = true

[lib]
doctest = false
