[package]
name = "xiuxian-llm"
version.workspace = true
edition.workspace = true
description = "LLM/embedding runtime primitives shared across xiuxian and xiuxian-daochang"
authors = ["CyberXiuXian Artisan workshop"]
license = "Apache-2.0"
publish = false

[features]
default = ["provider-litellm"]
provider-litellm = []

[dependencies]
byteorder = "1.5"
anyhow = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time"] }
futures = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
redis = { workspace = true, features = ["tokio-comp"] }
sha2 = { workspace = true }
hex = { workspace = true }
base64 = { workspace = true }
num-traits = "0.2"
image = "0.25"
imageproc = "0.25"
xiuxian-macros = { path = "../xiuxian-macros" }
xiuxian-config-core = { path = "../xiuxian-config-core" }
litellm-rs = { workspace = true, features = ["redis"] }
spider = { version = "2.45.29", default-features = false, features = ["basic"] }

[dev-dependencies]
tempfile = "3.10"
axum = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
env_logger = "0.11"
tracing-subscriber = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-machete]
ignored = ["toml", "xiuxian-config-core"]

[lib]
doctest = false
