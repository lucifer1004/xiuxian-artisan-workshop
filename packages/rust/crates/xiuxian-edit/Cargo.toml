[package]
name = "xiuxian-edit"
version.workspace = true
edition.workspace = true

[dependencies]
# The Surgeon - Structural refactoring
# Using xiuxian-ast for unified ast-grep (v0.40.5)
xiuxian-ast = { path = "../xiuxian-ast" }

# Diff generation for preview
similar = "2.7"
once_cell = "1.19"
regex = "1.11"
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
xiuxian-io = { path = "../xiuxian-io" }
xiuxian-testing = { path = "../xiuxian-testing" }

# The Ouroboros - Heavy-duty batch refactoring
rayon = "1.8"          # Parallel iteration
ignore = "0.4"         # .gitignore-aware file traversal
dashmap = "5.5"        # Concurrent HashMap for stats

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
