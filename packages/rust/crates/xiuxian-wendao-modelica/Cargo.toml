[package]
name = "xiuxian-wendao-modelica"
version.workspace = true
edition.workspace = true
description = "External Modelica Repo Intelligence plugin for xiuxian-wendao"
authors = ["CyberXiuXian Artisan workshop"]
license = "Apache-2.0"
publish = false

[features]
default = []
# Enable tree-sitter based parsing for richer AST extraction
tree-sitter = ["xiuxian-ast/modelica"]

[dependencies]
walkdir = { workspace = true }
inventory = "0.3"
xiuxian-wendao-core = { path = "../xiuxian-wendao-core" }
xiuxian-ast = { path = "../xiuxian-ast", optional = true }

[dev-dependencies]
git2 = { workspace = true }
insta = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
xiuxian-wendao = { path = "../xiuxian-wendao", default-features = false, features = ["zhenfa-router"] }

[lints]
workspace = true
