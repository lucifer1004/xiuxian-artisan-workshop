[package]
name = "xiuxian-daochang"
version.workspace = true
edition.workspace = true
description = "Minimal Rust agent loop: LLM + tool runtime, single turn (Phase B)"
authors = ["CyberXiuXian Artisan Studio"]
license = "Apache-2.0"
publish = false
default-run = "xiuxian-daochang"

[lib]
name = "xiuxian_daochang"

[[bin]]
name = "xiuxian-daochang"
path = "src/main.rs"
test = false
bench = false

[[bin]]
name = "webhook_dedup_probe"
path = "src/bin/webhook_dedup_probe.rs"
test = false
bench = false

[features]
default = ["agent-provider-litellm", "agent-discord", "agent-vision-dots-metal"]
agent-provider-litellm = ["dep:litellm-rs", "xiuxian-llm/provider-litellm"]
agent-discord = []
agent-vision-dots-metal = ["xiuxian-llm/vision-dots-metal"]

[dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "sync", "time"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
anyhow = { workspace = true }
async-trait = "0.1"
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
reqwest = { workspace = true, features = ["multipart"] }
futures = { workspace = true }
redis = { version = "1.0.3", default-features = false, features = ["tokio-comp"] }
pulldown-cmark = "0.12"
include_dir = { workspace = true }
num-traits = "0.2"
sha2 = { workspace = true }
hex = { workspace = true }
base64 = { workspace = true }
fs2 = "0.4"
serenity = { version = "0.12.5", default-features = false, features = ["client", "gateway", "model", "rustls_backend"] }
litellm-rs = { workspace = true, features = ["redis"], optional = true }

toml = { workspace = true }

xiuxian-memory-engine = { path = "../xiuxian-memory-engine", default-features = false, features = ["valkey"] }
xiuxian-types = { path = "../xiuxian-types" }
xiuxian-qianhuan = { path = "../xiuxian-qianhuan", features = ["zhenfa-router"] }
xiuxian-qianji = { path = "../xiuxian-qianji", features = ["llm"] }
xiuxian-llm = { path = "../xiuxian-llm" }
xiuxian-zhenfa = { path = "../xiuxian-zhenfa" }
xiuxian-wendao = { path = "../xiuxian-wendao", features = ["zhenfa-router"] }
xiuxian-config-core = { path = "../xiuxian-config-core" }
xiuxian-logging = { path = "../xiuxian-logging" }
xiuxian-skills = { path = "../xiuxian-skills" }
xiuxian-window = { path = "../xiuxian-window" }
xiuxian-tokenizer = { path = "../xiuxian-tokenizer" }
xiuxian-zhixing = { path = "../xiuxian-zhixing" }
axum = { workspace = true, features = ["multipart"] }
clap = { workspace = true }
xiuxian-macros = { path = "../xiuxian-macros" }

[dev-dependencies]
chrono = { workspace = true }
tempfile = { workspace = true }
tower = { version = "0.5", features = ["util"] }
rmcp = { workspace = true }

[lints]
workspace = true
