[package]
name = "xiuxian-ast"
version.workspace = true
edition.workspace = true
description = "Unified AST utilities using ast-grep"
authors = ["CyberXiuXian Artisan Studio"]
license = "Apache-2.0"
publish = false

[features]
default = []
julia = ["dep:tree-sitter-julia"]
modelica = ["dep:libloading"]

[dependencies]
# ast-grep - AST pattern matching (unified version)
ast-grep-core = "0.40.5"
ast-grep-language = "0.40.5"
ast-grep-config = "0.40.5"

# Common utilities
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
regex = "1"

# File traversal
walkdir = { workspace = true }
xiuxian-io = { path = "../xiuxian-io" }
tree-sitter = "0.26.5"
tree-sitter-python = "0.25.0"
tree-sitter-julia = { version = "0.23.1", optional = true }
libloading = { version = "0.9", optional = true }

[dev-dependencies]
insta = { workspace = true }
tempfile = { workspace = true }
xiuxian-testing = { path = "../xiuxian-testing" }

[lints]
workspace = true
