id = "wendao.docs.retrieval_context"
version = 1
task_types = ["http_call", "cli_call"]

[http]
method = "GET"
path = "/api/docs/retrieval-context"
query = ["repo", "page_id", "node_id", "related_limit"]

[cli]
argv = ["wendao", "docs", "context"]

[cli.flags]
node_id = "--node-id"
page_id = "--page-id"
related_limit = "--related-limit"
repo = "--repo"

[tool]
name = "wendao.docs.get_retrieval_context"
schema_provider = "DocsRetrievalContextToolArgs"
runtime_injected = ["repo"]

[[params]]
name = "repo"
type = "string"
required = true

[[params]]
name = "page_id"
type = "string"
required = true

[[params]]
name = "node_id"
type = "string"

[[params]]
name = "related_limit"
type = "integer"
default = 5
