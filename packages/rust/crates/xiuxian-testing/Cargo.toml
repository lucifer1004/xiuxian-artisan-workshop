[package]
name = "xiuxian-testing"
version.workspace = true
edition.workspace = true
description = "Shared testing utilities and scenario framework for xiuxian crates"
authors = ["CyberXiuXian Artisan workshop"]
license = "Apache-2.0"
publish = false

[features]
default = []
performance = ["dep:futures", "dep:hdrhistogram", "dep:tokio"]

[dependencies]
# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true, optional = true }
hdrhistogram = { version = "7.5", optional = true }
tokio = { workspace = true, optional = true }

# Error handling
anyhow = { workspace = true }
proc-macro2 = { version = "1", features = ["span-locations"] }
syn = { version = "2.0", features = ["full"] }

# File system utilities
tempfile = { workspace = true }

# Snapshot testing
insta = { workspace = true }

[dev-dependencies]
futures = { workspace = true }

[lints]
workspace = true
