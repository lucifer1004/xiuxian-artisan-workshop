name: Setup Environment
inputs:
  CACHIX_AUTH_TOKEN:
    required: true
    description: "Cachix Auth Token"
  SECRET_GITHUB_TOKEN:
    required: true
    description: "Github Secret Token"
  GLM_API_KEY:
    required: true
    description: "GLM API Key"
    
runs:
  using: "composite"
  steps:
    - uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: |
          accept-flake-config = true
        github_token: ${{ inputs.SECRET_GITHUB_TOKEN }}

    # - uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Setup cachix
      uses: cachix/cachix-action@master
      with:
        name: tao3k
        authToken: "${{ inputs.CACHIX_AUTH_TOKEN }}"
          # signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"

    - name: Install devenv.sh
      shell: bash
      run: nix profile add nixpkgs#devenv

    - name: Install secretspec and write .env
      shell: bash
      env:
        GLM_API_KEY: ${{ inputs.GLM_API_KEY }}
      run: |
        nix profile add nixpkgs#secretspec
        echo "GLM_API_KEY=$GLM_API_KEY" > .env
        # NAR hash mismatch in input issue, I don't know why
        # nix flake update omnibus
