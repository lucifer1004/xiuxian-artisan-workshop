name: "CI"
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  architecture-gate:
    runs-on: ubuntu-latest
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

      - name: Run architecture guardrails
        run: secretspec run --provider env --profile default -- devenv tasks run ci:architecture-gate

  lint:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

      - name: Run lint
        run: secretspec run --provider env --profile default -- devenv tasks run ci:lint

  check-format:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

      - name: Check format
        run: secretspec run --provider env --profile default -- devenv tasks run ci:check-format

  check-commits:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

      - name: Check commit messages
        run: secretspec run --provider env --profile default -- devenv tasks run ci:check-commits

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            perf_p95_ms: "700"
            perf_ratio_max: "4.0"
          - os: macos-latest
            perf_p95_ms: "900"
            perf_ratio_max: "4.5"
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      OMNI_VECTOR_PERF_P95_MS: ${{ matrix.perf_p95_ms }}
      OMNI_VECTOR_PERF_RATIO_MAX: ${{ matrix.perf_ratio_max }}
      CARGO_TARGET_DIR: /tmp/workspace-strict-proof
      XIUXIAN_WENDAO_GATE_REPORT_DIR: ".run/reports/wendao-ppr-gate"
      XIUXIAN_WENDAO_MIXED_CANARY_REPORT_DIR: ".run/reports/wendao-ppr-mixed-canary"
      XIUXIAN_WENDAO_GATE_SUMMARY_STRICT_GREEN: "1"
      XIUXIAN_WENDAO_ROLLOUT_REQUIRED_RUNS: "7"
      XIUXIAN_WENDAO_ROLLOUT_MIN_MIXED_TOP3_RATE: "0.90"
      XIUXIAN_WENDAO_ROLLOUT_STRICT_READY: "1"
      OMNI_ENABLE_EMBED_ROLE_PERF_GATE: "1"
      OMNI_EMBED_ROLE_PERF_GATE_PROFILE: "medium"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

      - name: Rust gate - quality gates (strict clippy + nextest + xiuxian-core-rs runtime lane)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-quality-gate

      - name: Rust gate - dependency security (cargo-audit + cargo-deny)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-security-gate

      - name: Rust gate - contract and dependency governance
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-contract-dependency-governance

      - name: Rust gate - xiuxian-core-rs lib runtime lane (explicit)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-core-rs-lib

      - name: Rust gate - xiuxian-daochang profile matrix (default + no-default-features)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-daochang-profiles

      - name: Rust gate - xiuxian-daochang dependency graph assertions
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-daochang-dependency-assertions

      - name: Rust gate - xiuxian-daochang backend role contracts
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-daochang-backend-role-contracts

      - name: Rust gate - xiuxian-qianji scenario-audit contracts
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-qianji-scenario-audit-contracts

      - name: Rust gate - xiuxian-wendao contract-feedback consumer
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-wendao-contract-feedback-consumer

      - name: Rust gate - snapshot contracts
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-fusion-snapshots

      - name: Rust gate - search perf guard
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-search-perf-guard

      - name: Rust gate - xiuxian-wendao retrieval audits
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-retrieval-audits

      - name: Rust gate - xiuxian-wendao WG2/WG3 unified PPR gate
        env:
          XIUXIAN_WENDAO_GATE_BUILD_MODE: "build"
          XIUXIAN_WENDAO_GATE_CONFIG: "packages/rust/crates/xiuxian-wendao/resources/config/wendao.yaml"
        run: secretspec run --provider env --profile default -- devenv tasks run ci:wendao-ppr-gate

      - name: Rust gate - xiuxian-wendao WG2/WG3 JSON report
        if: ${{ always() }}
        env:
          XIUXIAN_WENDAO_GATE_BUILD_MODE: "no-build"
          XIUXIAN_WENDAO_GATE_CONFIG: "packages/rust/crates/xiuxian-wendao/resources/config/wendao.yaml"
          XIUXIAN_WENDAO_GATE_OUTPUT_MODE: "json"
        run: secretspec run --provider env --profile default -- devenv tasks run ci:wendao-ppr-report

      - name: Rust gate (advisory) - xiuxian-wendao mixed-scope canary
        continue-on-error: true
        if: ${{ always() }}
        env:
          XIUXIAN_WENDAO_GATE_BUILD_MODE: "no-build"
          XIUXIAN_WENDAO_GATE_CONFIG: "packages/rust/crates/xiuxian-wendao/resources/config/wendao.yaml"
          XIUXIAN_WENDAO_GATE_OUTPUT_MODE: "json"
        run: secretspec run --provider env --profile default -- devenv tasks run ci:wendao-ppr-mixed-canary

      - name: Rust gate - xiuxian-wendao report contract validation
        if: ${{ always() }}
        run: secretspec run --provider env --profile default -- devenv tasks run ci:wendao-ppr-report-validate

      - name: Rust gate - xiuxian-wendao gate summary
        if: ${{ always() }}
        run: secretspec run --provider env --profile default -- devenv tasks run ci:wendao-ppr-gate-summary

      - name: Contract E2E - route test JSON (Rust -> Python -> CLI schema)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:contract-e2e-route-test-json

      - name: Contract freeze - schemas and canonical snapshots
        run: secretspec run --provider env --profile default -- devenv tasks run ci:contract-freeze

      - name: Guard - no inline Python execution patterns
        run: secretspec run --provider env --profile default -- devenv tasks run ci:no-inline-python-guard

      - name: Run tests
        run: secretspec run --provider env --profile default -- devenv tasks run ci:test-quick

      - name: Rust gate - xiuxian-wendao rollout sign-off tracker
        if: ${{ always() }}
        env:
          XIUXIAN_WENDAO_ROLLOUT_FETCH_REMOTE_STATUS: "1"
          XIUXIAN_WENDAO_ROLLOUT_REMOTE_WORKFLOW_FILE: "ci.yaml"
          XIUXIAN_WENDAO_ROLLOUT_REMOTE_ARTIFACT_NAME: "wendao-ppr-gate-${{ matrix.os }}"
          XIUXIAN_WENDAO_ROLLOUT_REMOTE_RUN_STATUS: "completed"
        run: secretspec run --provider env --profile default -- devenv tasks run ci:wendao-ppr-rollout-status

      - name: Wendao rollout summary (step summary)
        if: ${{ always() }}
        run: |
          summary_file="${XIUXIAN_WENDAO_GATE_REPORT_DIR}/wendao_gate_rollout_status.md"
          fallback_file="${XIUXIAN_WENDAO_GATE_REPORT_DIR}/wendao_rollout_status.md"
          if [ -f "${summary_file}" ]; then
            cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"
          elif [ -f "${fallback_file}" ]; then
            cat "${fallback_file}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Wendao rollout summary not found: ${summary_file} (fallback: ${fallback_file})" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload wendao PPR gate reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: wendao-ppr-gate-${{ matrix.os }}
          path: ${{ env.XIUXIAN_WENDAO_GATE_REPORT_DIR }}
          if-no-files-found: warn

      - name: Upload wendao mixed-scope canary reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: wendao-ppr-mixed-canary-${{ matrix.os }}
          path: ${{ env.XIUXIAN_WENDAO_MIXED_CANARY_REPORT_DIR }}
          if-no-files-found: warn

      - name: Upload wendao rollout status reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: wendao-rollout-status-${{ matrix.os }}
          path: |
            ${{ env.XIUXIAN_WENDAO_GATE_REPORT_DIR }}/report_validation.json
            ${{ env.XIUXIAN_WENDAO_GATE_REPORT_DIR }}/wendao_gate_status_summary.json
            ${{ env.XIUXIAN_WENDAO_GATE_REPORT_DIR }}/wendao_gate_status_summary.md
            ${{ env.XIUXIAN_WENDAO_GATE_REPORT_DIR }}/wendao_gate_rollout_status.md
            ${{ env.XIUXIAN_WENDAO_GATE_REPORT_DIR }}/wendao_rollout_status.json
            ${{ env.XIUXIAN_WENDAO_GATE_REPORT_DIR }}/wendao_rollout_status.md
            ${{ env.XIUXIAN_WENDAO_GATE_REPORT_DIR }}/wendao_rollout_status.previous.json
            ${{ env.XIUXIAN_WENDAO_GATE_REPORT_DIR }}/wendao_rollout_status_previous_fetch.json
          if-no-files-found: warn

      - name: Upload embedding role perf reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: embedding-role-perf-${{ matrix.os }}
          path: |
            .run/reports/xiuxian-daochang-embedding-role-perf-smoke.medium.json
            .run/logs/xiuxian-daochang-embedding-role-*.log
          if-no-files-found: warn
