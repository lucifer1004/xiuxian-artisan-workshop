name: "Checks"
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-checks:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      CARGO_TARGET_DIR: /tmp/workspace-strict-proof
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

      - name: Rust quality gates (check + strict clippy + nextest + xiuxian-core-rs runtime lane)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-quality-gate

      - name: Rust dependency security gate (cargo-audit + cargo-deny)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-security-gate

      - name: Rust contract and dependency governance gate
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-contract-dependency-governance

      - name: Rust gate - xiuxian-core-rs lib runtime lane (explicit)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-core-rs-lib

      - name: Rust gate - xiuxian-daochang profile matrix (default + no-default-features)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-daochang-profiles

      - name: Rust gate - xiuxian-daochang dependency graph assertions
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-daochang-dependency-assertions

      - name: Rust gate - xiuxian-daochang backend role contracts
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-daochang-backend-role-contracts

      - name: Rust gate - xiuxian-qianji scenario-audit contracts
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-qianji-scenario-audit-contracts

      - name: Rust gate - xiuxian-testing contract packs
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-testing-contract-gates

      - name: Rust gate - xiuxian-wendao contract-feedback consumer
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-wendao-contract-feedback-consumer

      - name: Runtime gate - native runtime smoke
        run: secretspec run --provider env --profile default -- devenv tasks run ci:native-runtime-smoke

  telegram-session-isolation-gate:
    runs-on: ubuntu-latest
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

      - name: Telegram session isolation gate (targeted regressions)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:telegram-session-isolation-rust

      - name: Telegram isolation gate (Python script regressions)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:telegram-session-isolation-python

  nix-build-packages:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        package:
          - xiuxian-artisan-workshop
          - xiuxian-ast-release
          - xiuxian-config-core-release
          - xiuxian-core-rs-release
          - xiuxian-core-rs-python-bindings
          - xiuxian-daochang-release
          - xiuxian-edit-release
          - xiuxian-event-release
          - xiuxian-executor-release
          - xiuxian-io-release
          - xiuxian-lance-release
          - xiuxian-llm-release
          - xiuxian-logging-release
          - xiuxian-macros-release
          - xiuxian-memory-release
          - xiuxian-memory-engine-release
          - xiuxian-qianhuan-release
          - xiuxian-qianji-release
          - xiuxian-sandbox-release
          - xiuxian-security-release
          - xiuxian-skills-release
          - xiuxian-tags-release
          - xiuxian-testing-release
          - xiuxian-tokenizer-release
          - xiuxian-tui-release
          - xiuxian-types-release
          - xiuxian-vector-release
          - xiuxian-wendao-release
          - xiuxian-window-release
          - xiuxian-zhenfa-release
          - xiuxian-zhixing-release
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

      - name: Build nix package
        run: nix build .#${{ matrix.package }} -v
