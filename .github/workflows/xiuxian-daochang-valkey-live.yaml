name: "Omni-Agent Valkey Live"

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

jobs:
  valkey-live:
    runs-on: ubuntu-latest
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      CARGO_TARGET_DIR: /tmp/workspace-strict-proof
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Run full live Valkey webhook verification
        run: secretspec run --provider env --profile default -- devenv tasks run ci:valkey-live
