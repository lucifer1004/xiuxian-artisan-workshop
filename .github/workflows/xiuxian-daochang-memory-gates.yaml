name: "Omni-Agent Memory Gates"

on:
  pull_request:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Gate profile to run"
        required: true
        type: choice
        options:
          - quick
          - nightly
        default: quick

jobs:
  memory-gate-quick:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'quick')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Run xiuxian-daochang memory gate (quick)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:memory-gate-quick

  memory-gate-nightly:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'nightly')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Run xiuxian-daochang memory gate (nightly)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:memory-gate-nightly

      - name: Upload xiuxian-daochang memory nightly reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: xiuxian-daochang-memory-nightly
          path: |
            .run/reports/xiuxian-daochang-memory-ci-latest-run.json
            .run/reports/xiuxian-daochang-memory-ci-latest-failure.json
            .run/reports/xiuxian-daochang-memory-ci-latest-failure.md
            .run/logs/xiuxian-daochang-memory-ci-nightly-*.log
            .run/logs/xiuxian-daochang-webhook-ci-nightly-*.log
            .run/logs/xiuxian-daochang-mock-telegram-nightly-*.log
          if-no-files-found: warn

  memory-gate-a7:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Run xiuxian-daochang memory gate (A7 mandatory path)
        run: secretspec run --provider env --profile default -- devenv tasks run ci:memory-gate-a7

      - name: Upload xiuxian-daochang memory A7 reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: xiuxian-daochang-memory-a7
          path: |
            .run/reports/xiuxian-daochang-memory-ci-latest-run.json
            .run/reports/xiuxian-daochang-memory-ci-latest-failure.json
            .run/reports/xiuxian-daochang-memory-ci-latest-failure.md
            .run/logs/xiuxian-daochang-memory-ci-nightly-*.log
            .run/logs/xiuxian-daochang-webhook-ci-nightly-*.log
            .run/logs/xiuxian-daochang-mock-telegram-nightly-*.log
          if-no-files-found: warn
