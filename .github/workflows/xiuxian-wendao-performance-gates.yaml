name: "Xiuxian Wendao Performance Gates"

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Performance gate profile to run"
        required: true
        type: choice
        options:
          - quick
          - nightly
        default: quick

jobs:
  wendao-performance-quick:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'quick'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      CARGO_TARGET_DIR: /tmp/workspace-strict-proof
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Run Wendao performance quick target
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-wendao-performance-quick

      - name: Run Wendao formal gateway performance proof
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-wendao-performance-gateway-formal

      - name: Render Wendao gateway perf summary
        if: ${{ always() }}
        run: secretspec run --provider env --profile default -- devenv tasks run ci:wendao-gateway-perf-summary

      - name: Wendao gateway perf summary (step summary)
        if: ${{ always() }}
        run: |
          summary_md=".run/reports/xiuxian-wendao/perf-gateway/gateway_perf_summary.md"
          echo "## Wendao Gateway Perf (${RUNNER_OS})" >> "${GITHUB_STEP_SUMMARY}"
          if [ -f "${summary_md}" ]; then
            cat "${summary_md}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "- summary markdown missing: \`${summary_md}\`" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload Wendao performance quick reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: wendao-performance-quick
          path: |
            .run/reports/xiuxian-wendao/perf/**
          if-no-files-found: warn

  wendao-performance-nightly:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'nightly')
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      CARGO_TARGET_DIR: /tmp/workspace-strict-proof
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}

      - name: Run Wendao performance quick target
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-wendao-performance-quick

      - name: Run Wendao formal gateway performance proof
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-wendao-performance-gateway-formal

      - name: Render Wendao gateway perf summary
        if: ${{ always() }}
        run: secretspec run --provider env --profile default -- devenv tasks run ci:wendao-gateway-perf-summary

      - name: Wendao gateway perf summary (step summary)
        if: ${{ always() }}
        run: |
          summary_md=".run/reports/xiuxian-wendao/perf-gateway/gateway_perf_summary.md"
          echo "## Wendao Gateway Perf (${RUNNER_OS})" >> "${GITHUB_STEP_SUMMARY}"
          if [ -f "${summary_md}" ]; then
            cat "${summary_md}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "- summary markdown missing: \`${summary_md}\`" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Run Wendao performance stress gate
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-wendao-performance-stress

      - name: Compile Wendao performance bench (fast lane, advisory)
        continue-on-error: true
        run: secretspec run --provider env --profile default -- devenv tasks run ci:rust-wendao-performance-bench-fast

      - name: Upload Wendao performance nightly reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: wendao-performance-nightly
          path: |
            .run/reports/xiuxian-wendao/perf/**
          if-no-files-found: warn
