name: "Xiuxian Artisan Workshop Embedding Gates"

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Embedding gate profile to run"
        required: true
        type: choice
        options:
          - medium
          - heavy
        default: heavy

jobs:
  embedding-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      CARGO_TARGET_DIR: /tmp/workspace-strict-proof
      OMNI_EMBED_ROLE_PERF_GATE_PROFILE: ${{ github.event_name == 'schedule' && 'heavy' || github.event.inputs.profile }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/common-setup
        with:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}

      - name: Run xiuxian-daochang embedding role perf gate
        run: |
          case "${OMNI_EMBED_ROLE_PERF_GATE_PROFILE}" in
            medium)
              secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-daochang-embedding-role-perf-medium-gate
              ;;
            heavy)
              secretspec run --provider env --profile default -- devenv tasks run ci:rust-xiuxian-daochang-embedding-role-perf-heavy-gate
              ;;
            *)
              echo "Unsupported OMNI_EMBED_ROLE_PERF_GATE_PROFILE='${OMNI_EMBED_ROLE_PERF_GATE_PROFILE}'." >&2
              exit 1
              ;;
          esac

      - name: Upload embedding role perf reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: embedding-role-perf-${{ env.OMNI_EMBED_ROLE_PERF_GATE_PROFILE }}
          path: |
            .run/reports/xiuxian-daochang-embedding-role-perf-smoke.medium.json
            .run/reports/xiuxian-daochang-embedding-role-perf-smoke.heavy.json
            .run/logs/xiuxian-daochang-embedding-role-*.log
          if-no-files-found: warn
